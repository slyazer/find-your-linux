<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DistroMatch — Find Your Linux</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14;
  --glass:rgba(255,255,255,.04);
  --bdr:rgba(255,255,255,.10);
  --mint:#4fffb0;
  --violet:#7b61ff;
  --coral:#ff6b6b;
  --txt:#e8edf5;
  --muted:#9ba8bc;
  --r:16px;
  --rl:24px;
  --mono:'DM Mono',monospace;
  --sans:'Syne',sans-serif;
  --ease:.35s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(79,255,176,.12) 0%,transparent 70%);
  top:-20%;left:-15%;animation:d1 18s ease-in-out infinite alternate}
.bg::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(123,97,255,.14) 0%,transparent 70%);
  bottom:-15%;right:-10%;animation:d2 22s ease-in-out infinite alternate}
.orb{position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,107,.10) 0%,transparent 70%);
  top:50%;left:60%;animation:d3 15s ease-in-out infinite alternate}
.stars{position:absolute;inset:0;background-image:
  radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 55% 15%,rgba(255,255,255,.35) 0%,transparent 100%),
  radial-gradient(1px 1px at 75% 50%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 20% 45%,rgba(255,255,255,.35) 0%,transparent 100%)}
@keyframes d1{from{transform:translate(0,0) scale(1)}to{transform:translate(80px,60px) scale(1.2)}}
@keyframes d2{from{transform:translate(0,0)}to{transform:translate(-60px,-80px) scale(1.15)}}
@keyframes d3{from{transform:translate(0,0)}to{transform:translate(-100px,70px)}}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.particle{position:absolute;background:var(--mint);border-radius:50%;
  opacity:0;will-change:transform,opacity}
.app{position:relative;z-index:1;width:100%;max-width:780px;padding:24px 16px 48px}
.brand{text-align:center;margin-bottom:28px}
.brand-tag{font-family:var(--mono);font-size:12px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--mint);opacity:.8;margin-bottom:6px}
.brand h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:800;
  background:linear-gradient(135deg,var(--mint) 0%,#fff 50%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;letter-spacing:-.02em}
.brand p{margin-top:8px;color:var(--muted);font-size:.9rem;font-family:var(--mono);font-weight:300}
.prog-wrap{margin-bottom:24px}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:7px}
.prog-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.prog-num{font-family:var(--mono);font-size:11px;color:var(--mint)}
.prog-track{height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg, var(--violet), var(--mint), var(--violet));
  background-size:200% 100%;
  animation:shimmer 2s linear infinite;
  box-shadow:0 0 10px var(--mint);
  transition:width .55s cubic-bezier(.4,0,.2,1);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.card{background:rgba(10,15,30,.85);border:1px solid rgba(255,255,255,.10);border-radius:var(--rl);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:36px;
  box-shadow:0 4px 48px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07);
  transition:border-color .35s,box-shadow .3s ease}
.card:hover{border-color:rgba(79,255,176,.25)}
@media(max-width:540px){.card{padding:22px 16px}}
.screen{animation:up .38s cubic-bezier(.4,0,.2,1) both}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.fade-out{animation:down .22s cubic-bezier(.4,0,.2,1) both}
@keyframes down{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}
.q-label{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--mint);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.q-label::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--mint),transparent);opacity:.35}
.q-text{font-size:clamp(1.05rem,3vw,1.35rem);font-weight:700;line-height:1.4;
  margin-bottom:24px;color:#fff}
.opts{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px;margin-bottom:24px}
.opts.single-col{grid-template-columns:1fr}
@media(max-width:600px){.opts{grid-template-columns:1fr}}
.opt{all:unset;cursor:pointer;display:flex;flex-direction:column;gap:5px;
  align-items:flex-start;background:rgba(20,28,48,.6);
  border:1px solid rgba(255,255,255,.10);border-radius:var(--r);
  padding:15px 14px;
  transition:transform .25s cubic-bezier(.4,0,.2,1), border-color .25s, box-shadow .25s, background .25s;
  position:relative;overflow:hidden;min-height:unset;width:100%;min-width:0;word-break:break-word;
  box-sizing:border-box;opacity:0;animation:fadeInOpt .4s forwards}
.opt::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(79,255,176,.06),rgba(123,97,255,.06));
  opacity:0;transition:opacity var(--ease)}
.opt:hover::before,.opt.on::before{opacity:1}
.opt:hover{
  border-color:rgba(79,255,176,.38);
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 12px 28px rgba(79,255,176,.15)}
.opt.on{border-color:var(--mint);background:rgba(79,255,176,.07);
  box-shadow:0 0 0 1px var(--mint),0 6px 28px rgba(79,255,176,.18)}
.opt-ltr{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--mint);
  background:rgba(79,255,176,.1);border-radius:4px;padding:2px 6px;flex-shrink:0}
.opt.on .opt-ltr{background:var(--mint);color:var(--bg)}
.opt-ico{font-size:1.3rem;line-height:1;flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.opt-ico svg{width:26px;height:26px;display:block}
.opt-ico img{max-width:26px;max-height:26px;object-fit:contain;display:block}
.opt-main{font-size:.87rem;font-weight:600;color:var(--txt);line-height:1.25;min-width:0}
.opt-sub2{font-family:var(--mono);font-size:.69rem;color:rgba(200,210,228,.75);
  font-weight:300;line-height:1.35;min-width:0}
@keyframes fadeInOpt{to{opacity:1}}
.tried-wrap{margin-bottom:16px}
.tried-label{font-family:var(--mono);font-size:.76rem;color:var(--muted);
  margin-bottom:8px;display:block;font-weight:300}
.tried-input{width:100%;background:rgba(20,28,48,.6);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:13px 16px;color:var(--txt);font-family:var(--mono);
  font-size:.9rem;outline:none;transition:all var(--ease)}
.tried-input::placeholder{color:rgba(107,122,150,.55)}
.tried-input:focus{border-color:rgba(79,255,176,.5);
  box-shadow:0 0 0 3px rgba(79,255,176,.07);background:rgba(25,35,55,.8)}
.tried-hint{font-family:var(--mono);font-size:.7rem;color:var(--mint);
  margin-top:6px;min-height:18px}
.distro-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.distro-tag{display:inline-flex;align-items:center;gap:6px;
  background:rgba(79,255,176,.12);border:1px solid rgba(79,255,176,.35);
  border-radius:8px;padding:4px 12px 4px 8px;cursor:pointer;
  font-family:var(--mono);font-size:.78rem;color:var(--mint);
  transition:all .2s}
.distro-tag:hover{
  border-color:var(--coral);
  box-shadow:0 0 12px rgba(255,107,107,.6);
  background:rgba(255,107,107,.12);
  color:var(--coral)}
.distro-tag-remove{margin-left:2px;font-weight:700;opacity:.7}
.btn-row{display:flex;justify-content:flex-end;align-items:center;gap:14px;position:relative;z-index:10}
.btn-next{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:9px;
  pointer-events:auto;
  background:linear-gradient(135deg,var(--violet),var(--mint));color:var(--bg);
  font-family:var(--sans);font-weight:700;font-size:.88rem;padding:13px 26px;
  border-radius:12px;transition:all var(--ease);box-shadow:0 4px 22px rgba(79,255,176,.22);
  position:relative}
.btn-next::after{content:'';position:absolute;inset:-2px;border-radius:14px;
  background:linear-gradient(135deg,var(--violet),var(--mint));z-index:-1;
  opacity:0;transition:opacity .3s;filter:blur(8px)}
.btn-next:not(:disabled):hover::after{opacity:.6}
.btn-next:disabled{opacity:.28;cursor:not-allowed;transform:none!important;box-shadow:none}
.btn-next:not(:disabled):hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 10px 32px rgba(79,255,176,.38)}
.btn-next:not(:disabled):active{transform:scale(.97)}
.arr{font-size:1rem;transition:transform var(--ease)}
.btn-next:not(:disabled):hover .arr{transform:translateX(4px)}
.btn-skip:focus-visible, .btn-next:focus-visible, .btn-back:focus-visible, .opt:focus-visible, .settings-gear:focus-visible {
  outline: 2px solid var(--mint);
  outline-offset: 2px;
}
.btn-skip{all:unset;cursor:pointer;font-family:var(--mono);font-size:.76rem;
  color:var(--muted);padding:6px 8px;border:1px solid transparent;border-radius:8px;transition:all var(--ease)}
.btn-skip:hover{color:var(--txt);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.04)}
.btn-back{all:unset;cursor:pointer;font-family:var(--mono);font-size:.76rem;
  color:var(--muted);margin-right:auto;padding:6px 8px;border:1px solid transparent;border-radius:8px;transition:all var(--ease)}
.btn-back:hover{color:var(--txt);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.04)}
.start{text-align:center}
.hero{font-size:3.4rem;margin-bottom:14px;
  filter:drop-shadow(0 0 18px rgba(79,255,176,.4));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.start h2{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;margin-bottom:10px;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--mint) 0%,#fff 50%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.start p{color:var(--muted);font-family:var(--mono);font-size:.86rem;line-height:1.7;
  max-width:450px;margin:0 auto 24px;font-weight:300}
.badge{display:inline-flex;align-items:center;gap:6px;color:var(--mint);
  font-family:var(--mono);font-size:.8rem;background:rgba(79,255,176,.08);
  border:1px solid rgba(79,255,176,.2);border-radius:99px;padding:5px 14px;margin-bottom:28px}
.start .btn-next{margin-top:8px;position:relative;z-index:20}
.strip{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;position:relative;z-index:50}
.strip-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:8px 5px;transition:all var(--ease);cursor:pointer;width:58px}
.strip-item:hover{border-color:rgba(79,255,176,.5);background:rgba(79,255,176,.1);transform:translateY(-3px);box-shadow:0 6px 20px rgba(79,255,176,.2)}
.strip-item:active{transform:scale(.93)}
.strip-item img{width:32px;height:32px;object-fit:contain;border-radius:4px;
  background:rgba(255,255,255,.04);display:block}
.strip-item svg{display:block;border-radius:50%}
.strip-name{font-family:var(--mono);font-size:.48rem;color:rgba(180,195,215,.7);
  width:100%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.result{animation:up .55s cubic-bezier(.4,0,.2,1) both;text-align:center}
.res-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mint);
  background:rgba(79,255,176,.08);border:1px solid rgba(79,255,176,.18);
  border-radius:99px;padding:6px 15px;margin-bottom:22px}
.logo-ring{width:108px;height:108px;border-radius:50%;margin:0 auto 18px;
  background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  animation:logoSpinIn .6s cubic-bezier(.4,0,.2,1), logoPulse 3s ease-in-out .6s infinite}
@keyframes logoSpinIn{from{transform:scale(0.5) rotate(-180deg)}to{transform:scale(1) rotate(0deg)}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 36px rgba(79,255,176,.14)}50%{box-shadow:0 0 58px rgba(79,255,176,.28)}}
.logo-ring img{width:76px;height:76px;object-fit:contain;filter:drop-shadow(0 3px 10px rgba(0,0,0,.5))}
.res-name{font-size:clamp(1.9rem,5.5vw,2.9rem);font-weight:800;
  background:linear-gradient(135deg,var(--mint) 0%,#fff 50%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.02em;margin-bottom:6px;
  background-size:200% auto;
  animation:nameShimmer 3s linear infinite}
@keyframes nameShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.res-line{font-family:var(--mono);font-size:.78rem;color:var(--violet);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}
.res-desc{font-size:.94rem;color:rgba(232,237,245,.73);line-height:1.72;
  max-width:510px;margin:0 auto 18px;font-family:var(--mono);font-weight:300;text-align:left;
  background:rgba(255,255,255,.03);border-left:2px solid var(--mint);
  padding:14px 18px;border-radius:0 11px 11px 0}
.filter-note{background:rgba(79,255,176,.06);border:1px solid rgba(79,255,176,.22);
  border-radius:14px;padding:12px 18px;margin-bottom:16px;text-align:left;
  font-family:var(--mono);font-size:.78rem;color:rgba(79,255,176,.9);font-weight:300}
.mismatch-box{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.25);
  border-radius:14px;padding:16px 20px;margin-bottom:20px;text-align:left}
.mismatch-title{font-family:var(--mono);font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--coral);margin-bottom:6px}
.mismatch-body{font-family:var(--mono);font-size:.76rem;color:rgba(220,225,235,.8);
  line-height:1.6;font-weight:300}
.mismatch-body code{color:var(--coral);background:rgba(255,107,107,.1);
  padding:1px 5px;border-radius:4px;font-size:.72rem}
.tags{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.tag{font-family:var(--mono);font-size:.73rem;color:var(--muted);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:99px;padding:6px 14px}
.tried-box{background:rgba(123,97,255,.06);border:1px solid rgba(123,97,255,.22);
  border-radius:14px;padding:16px 20px;margin-bottom:16px;text-align:left;
  display:flex;align-items:center;gap:14px}
.tried-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0}
.tried-info{flex:1}
.tried-title{font-family:var(--mono);font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--violet);margin-bottom:3px}
.tried-name-row{font-size:.9rem;font-weight:700;color:var(--txt)}
.tried-reason{font-family:var(--mono);font-size:.7rem;color:rgba(200,210,228,.75);
  font-weight:300;margin-top:3px;line-height:1.4}
.runners-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.runners{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.runner{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 13px;
  font-size:.8rem;font-weight:600;transition:all var(--ease)}
.runner img{width:20px;height:20px;object-fit:contain}
.runner:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07)}
.cta{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn-site{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--violet),var(--mint));color:var(--bg);
  font-family:var(--sans);font-weight:700;font-size:.86rem;padding:13px 24px;
  border-radius:12px;transition:all var(--ease);box-shadow:0 4px 22px rgba(79,255,176,.22);
  text-decoration:none}
.btn-site:hover{transform:translateY(-2px);box-shadow:0 8px 34px rgba(79,255,176,.34)}
.btn-ghost{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  border:1px solid rgba(255,255,255,.14);color:var(--txt);font-family:var(--sans);
  font-weight:600;font-size:.86rem;padding:13px 24px;border-radius:12px;transition:all var(--ease)}
.btn-ghost:hover{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.05);transform:translateY(-2px)}
.pick-grid{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.pick-card{all:unset;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:12px;
  background:rgba(20,28,48,.6);border:1px solid rgba(255,255,255,.10);
  border-radius:var(--rl);padding:28px 20px;transition:all .35s var(--ease);
  width:180px;text-align:center;position:relative;overflow:hidden}
.pick-card:hover{border-color:var(--mint);transform:scale(1.06);
  box-shadow:0 0 40px rgba(79,255,176,.25);background:rgba(79,255,176,.06)}
.pick-card:hover .pick-logo{transform:scale(1.15)}
.pick-card:active{transform:scale(.96)}
.pick-logo{width:64px;height:64px;object-fit:contain;transition:transform .4s var(--ease);
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.pick-name{font-size:1.1rem;font-weight:700;color:var(--txt)}
.pick-line{font-family:var(--mono);font-size:.7rem;color:var(--violet);text-transform:uppercase;letter-spacing:.08em}
.pick-badge{position:absolute;top:10px;right:10px;font-family:var(--mono);font-size:9px;
  color:var(--mint);background:rgba(79,255,176,.12);border-radius:6px;padding:3px 8px}
.pick-title{text-align:center;margin-bottom:8px}
.pick-title h3{font-size:1.2rem;font-weight:700;color:var(--txt)}
.pick-subtitle{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:4px}
.pick-back-row{display:flex;justify-content:center;margin-top:8px}
.distro-detail{text-align:center}
.distro-detail .back-link{
  font-family:var(--mono);
  font-size:.76rem;
  color:var(--muted);
  cursor:pointer;
  border-bottom:1px solid transparent;
  transition:all var(--ease);
  margin-bottom:20px;
  display:block;
  text-align:center;
}
.distro-detail .back-link:hover{color:var(--mint);border-bottom-color:var(--mint)}
.distro-detail .detail-logo{
  width:80px;
  height:80px;
  object-fit:contain;
  margin:0 auto 16px;
  display:block;
  filter:drop-shadow(0 4px 16px rgba(79,255,176,.3))
}
.distro-detail .detail-name{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;
  background:linear-gradient(135deg,var(--mint) 0%,#fff 50%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.distro-detail .detail-line{font-family:var(--mono);font-size:.76rem;color:var(--violet);text-transform:uppercase;letter-spacing:.1em;margin-bottom:18px}
.distro-detail .detail-desc{font-size:.9rem;color:rgba(232,237,245,.7);line-height:1.7;max-width:500px;margin:0 auto 24px;font-family:var(--mono);font-weight:300}

function matchDistro(raw) {
  const s = raw.trim().toLowerCase().replace(/[^a-z0-9 !_]/g,'');
  if (!s || s.length < 2) return null;
  for (const [key, names] of Object.entries(ALIASES)) {
    for (const n of names) {
      if (s === n) return key;
      if (Math.abs(s.length - n.length) <= 1 && lev(s, n) <= 1) return key;
      if (n.length >= 3 && (s.startsWith(n) || n.startsWith(s))) return key;
    }
  }
  return null;
}

function lev(a,b) {
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function getMismatch(distroKey, userDE) {
  if (!userDE) return null;
  const d = DB[distroKey];
  if (!d || d.defaultDE === 'other' || d.defaultDE === userDE) return null;
  const deName = {gnome:'GNOME', kde:'KDE Plasma', xfce:'XFCE', tiling:'a tiling WM'}[userDE] || userDE;
  return { deName, installCmd: DE_INSTALL[userDE] || '' };
}

// ═══════════════════════════════════════════════════════════════
//  SECTION 3: Scoring Engine (3-pass)
// ═══════════════════════════════════════════════════════════════

const UBUNTU_BASED = ['ubuntu','mint','zorin','elementary','popos'];
const ADVANCED_DISTROS = ['arch','gentoo','void','nixos','slackware','alpine'];

function computeTopThree(ignoreLightweight) {
  const secLock = userSignals.includes('security') && userSignals.includes('privacyHigh') && userDimensions.priv >= 4;
  const gamLock = userSignals.includes('gaming') && userDimensions.gaming >= 3;
  const liteLock = (!ignoreLightweight) && userSignals.includes('oldHardware') && userDimensions.light >= 4;

  let candidates = Object.keys(DB);

  const triedAdvanced = triedDistros.some(k => ADVANCED_DISTROS.includes(k) || DB[k].p.ease <= 1);
  if (triedAdvanced) {
    candidates = candidates.filter(k => !UBUNTU_BASED.includes(k));
  }

  if (secLock) {
    candidates = candidates.filter(k => ['kali','parrot','tails','qubes'].includes(k));
    activeMode = 'security';
  } else if (gamLock) {
    candidates = candidates.filter(k => DB[k].p.gaming >= 2);
    activeMode = 'gaming';
  } else if (liteLock) {
    candidates = candidates.filter(k => DB[k].p.light >= 3);
    activeMode = 'lightweight';
  } else {
    activeMode = null;
  }

  if (!secLock) {
    candidates = candidates.filter(k => {
      if (k === 'kali' || k === 'tails') return userDimensions.priv >= 6;
      return true;
    });
  }

  const thresholds = { priv:4, gaming:3, light:4, perf:3, stable:4, custom:4, cli:4 };
  let passed2 = candidates.filter(k => {
    for (let dim in thresholds) {
      if (userDimensions[dim] >= thresholds[dim] && DB[k].p[dim] === 0) return false;
    }
    return true;
  });

  const survivors = passed2.length >= 3 ? passed2 : candidates;

  const dimKeys = Object.keys(userDimensions);
  const mag = Math.sqrt(dimKeys.reduce((s,d) => s + userDimensions[d]*userDimensions[d], 0)) || 1;
  const uniqueSigs = [...new Set(userSignals)];

  const scored = survivors.map(key => {
    const dist = DB[key];
    const dot = dimKeys.reduce((s,d) => s + userDimensions[d] * dist.p[d], 0);
    const dmag = Math.sqrt(dimKeys.reduce((s,d) => s + dist.p[d]*dist.p[d], 0)) || 1;
    let score = (dot / (mag * dmag)) * 100;
    const sigMatches = (DISTRO_SIGNALS[key] || []).filter(s => uniqueSigs.includes(s)).length;
    score += sigMatches * 3;
    if (triedDistros.includes(key)) score -= 25;
    return { key, score };
  });

  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, 3).map(e => e.key);
}

function updateProgress() {
  document.getElementById('progLabel').textContent = t('progress');
  const total = QS.length;
  const done = mainAnswered;
  const pct = Math.round((done / total) * 100);
  $progFill().style.width = pct + '%';
  $progNum().textContent = Math.min(done + 1, total) + ' / ' + total;
}

function beginQuiz() {
  qIdx = 0; triedDistros = []; likeDone = false; dislikeDone = false; q1Ans = -1; mainAnswered = 0; userDEKey = null;
  userDimensions = {ease:0,stable:0,rolling:0,perf:0,priv:0,custom:0,cli:0,gaming:0,light:0,beauty:0};
  userSignals = []; selectedOpts = []; history.length = 0; activeMode = null; currentTopThree = [];
  ignoreLightweightMode = false; followUpSelected = [];
  document.getElementById('progWrap').style.display = '';
  tick();
}

function tick() {
  if (qIdx === 1 && triedDistros.length > 0 && q1Ans >= 1) {
    if (!likeDone) { showFollowUp('like'); return; }
    if (!dislikeDone) { showFollowUp('dislike'); return; }
  }
  showNormalQ();
}

function showNormalQ() {
  const q = QS[qIdx];
  const isLast = qIdx === QS.length - 1;
  updateProgress();

  const optsHTML = q.opts.map((o,i) => {
    const ico = o.isDE ? ICONS[o.ico] : `<span style="font-size:1.3rem;line-height:1">${o.i}</span>`;
    const sel = selectedOpts.includes(i);
    const optKey = 'q' + q.id + '_opt' + o.l;
    const mainText = t(optKey + 'm') || o.m;
    const subText = t(optKey + 's') || o.s;
    return `<button class="opt${sel ? ' on' : ''}" style="animation-delay:${i*60}ms" onclick="pickOpt(${i})">
      <span class="opt-ltr">${o.l}</span>${ico}
      <span class="opt-main">${mainText}</span>
      <span class="opt-sub2">${subText}</span>
    </button>`;
  }).join('');

  let triedHTML = '';
  if (q.hasTried && qIdx === 0) {
    const tagsHTML = triedDistros.map(k => {
      const d = DB[k];
      return `<span class="distro-tag" onclick="removeDistroTag('${k}')" title="Click to remove">${dname(d)} <span class="distro-tag-remove">✕</span></span>`;

  }

  const backBtn = history.length > 0 ? `<button class="btn-back" onclick="goBack()">← ${t('previous')}</button>` : '';

  swap(`<div class="screen">
    <div class="q-label">${t('question')} ${q.id} ${t('of')} ${QS.length}</div>
    <div class="q-text">${t('q'+q.id) || q.text}</div>

}

function pickOpt(i) {
  const q = QS[qIdx];
  const o = q.opts[i];
  if (selectedOpts.includes(i)) {
    // Deselecting
    selectedOpts = selectedOpts.filter(x => x !== i);
    Object.entries(o.v).forEach(([dim,val]) => userDimensions[dim] -= val);
    if (o.sig) o.sig.forEach(s => { const idx = userSignals.lastIndexOf(s); if(idx>=0) userSignals.splice(idx,1); });
    if (q.id===7 && o.isDE) userDEKey = null;
    document.querySelectorAll('#card .opt')[i].classList.remove('on');
    // Good jumpscare when unchecking AI option
    if (o.popup) { triggerGoodJumpscare(); }
  } else {
    // Selecting
    if (o.popup) { triggerJumpscare(); }
    selectedOpts.push(i);
    Object.entries(o.v).forEach(([dim,val]) => userDimensions[dim] += val);
    if (o.sig) userSignals.push(...o.sig);
    if (qIdx===0 && q1Ans===-1) q1Ans = i;
    if (q.id===7 && o.isDE) userDEKey = o.deKey;
    document.querySelectorAll('#card .opt')[i].classList.add('on');
  }
  const n = document.getElementById('nxt');
  if (n) n.disabled = (selectedOpts.length === 0);
}

function commitAndAdvance(isLast) {
  history.push({ qIdx, selected: [...selectedOpts] });
  selectedOpts = [];
  mainAnswered++;
  if (isLast) finish();
  else { qIdx++; tick(); }
}

function skipQuestion() {
  history.push({ qIdx, selected: [], skipped: true });
  selectedOpts = [];
  mainAnswered++;
  qIdx++;
  tick();
}

function goBack() {
  if (!history.length) return;
  const prev = history.pop();
  if (!prev.skipped) {
    const q = QS[prev.qIdx];
    prev.selected.forEach(i => {
      const o = q.opts[i];
      Object.entries(o.v).forEach(([dim,val]) => userDimensions[dim] -= val);
      if (o.sig) o.sig.forEach(s => { const idx = userSignals.lastIndexOf(s); if(idx>=0) userSignals.splice(idx,1); });
      if (q.id===7 && o.isDE) userDEKey = null;
    });
  }
  mainAnswered--;
  qIdx = prev.qIdx;
  selectedOpts = prev.skipped ? [] : [...prev.selected];
  tick();
}

function finish() {
  ignoreLightweightMode = false;
  swap(`<div class="spin-wrap screen"><div class="spinner"></div><div class="spin-txt">${t('analyzing')}<br>${t('matching')} <b>25 ${t('distros')}</b></div></div>`);
  setTimeout(() => {
    swap(`<div class="spin-wrap screen"><div class="spinner" style="border-top-color:var(--violet)"></div><div class="spin-txt">${t('narrowing')}<br><b>${t('almostThere')}</b></div></div>`);
    setTimeout(() => {
      currentTopThree = computeTopThree(false);
      showPickScreen();
    }, 1400);
  }, 1300);
}

function recomputeWithoutLightweight() {
  ignoreLightweightMode = true;
  currentTopThree = computeTopThree(true);
  activeMode = null;
  showPickScreen();
}

function handleDistroInput(e) {
  const input = document.getElementById('triedInput');
  const hint = document.getElementById('triedHint');
  if (e.key === 'Backspace' && input.value === '' && triedDistros.length > 0) {
    removeDistroTag(triedDistros[triedDistros.length-1]);
    return;
  }
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  if (!val) return;
  const key = matchDistro(val);
  if (key) {
    if (!triedDistros.includes(key)) {
      triedDistros.push(key);
      renderPills();
      hint.textContent = '';
    } else {
      hint.textContent = t('alreadyAdded');
    }
    input.value = '';
  } else {
    hint.textContent = val.length > 2 ? t('notRecognised') : '';
  }
}

function removeDistroTag(key) {
  triedDistros = triedDistros.filter(k => k !== key);
  renderPills();
}

function renderPills() {
  const container = document.getElementById('distroTags');
  if (!container) return;
  container.innerHTML = triedDistros.map(k => {
    const d = DB[k];
    return `<span class="distro-tag" onclick="removeDistroTag('${k}')" title="Click to remove">${dname(d)} <span class="distro-tag-remove">✕</span></span>`;
  }).join('');
}

function pickLike(i) {
  const o = LIKE_OPTS[i];
  if (followUpSelected.includes(i)) {
    followUpSelected = followUpSelected.filter(x => x !== i);
    Object.entries(o.v).forEach(([d,v]) => userDimensions[d] -= v);
    if (o.sig) o.sig.forEach(s => { const idx = userSignals.lastIndexOf(s); if(idx>=0) userSignals.splice(idx,1); });
    document.querySelectorAll('#card .opt')[i].classList.remove('on');
  } else {
    followUpSelected.push(i);
    Object.entries(o.v).forEach(([d,v]) => userDimensions[d] += v);
    if (o.sig) userSignals.push(...o.sig);
    document.querySelectorAll('#card .opt')[i].classList.add('on');
  }
  const n = document.getElementById('nxt');
  if (n) n.disabled = (followUpSelected.length === 0);
}

function pickDislike(i) {
  const o = DISLIKE_OPTS[i];
  if (followUpSelected.includes(i)) {
    followUpSelected = followUpSelected.filter(x => x !== i);
    Object.entries(o.v).forEach(([d,v]) => userDimensions[d] -= v);
    if (o.sig) o.sig.forEach(s => { const idx = userSignals.lastIndexOf(s); if(idx>=0) userSignals.splice(idx,1); });
    document.querySelectorAll('#card .opt')[i].classList.remove('on');
  } else {
    followUpSelected.push(i);

    if (o.sig) userSignals.push(...o.sig);
    document.querySelectorAll('#card .opt')[i].classList.add('on');
  }

function afterLike() { followUpSelected = []; likeDone = true; tick(); }
function afterDislike() { followUpSelected = []; dislikeDone = true; tick(); }

//  SECTION 6: Animated Background Particles (rAF)
// ═══════════════════════════════════════════════════════════════

(function() {
  const container = document.getElementById('particles');
  const particles = [];
  let mouseX = -1000, mouseY = -1000;
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const sx = Math.random() * 100, sy = Math.random() * 100;
    const sz = Math.random() * 4 + 2;
    el.style.width = el.style.height = sz + 'px';
    container.appendChild(el);
    const p = {
      el, sz,
      x: (sx/100) * window.innerWidth,
      y: (sy/100) * window.innerHeight,
      vx: (Math.random() - 0.5) * 1.5,
      vy: (Math.random() - 0.5) * 1.5 - 0.5
    };
    setTimeout(() => { el.style.opacity = '0.9'; }, Math.random()*2000);
    particles.push(p);
  }

  function update() {
    if (document.hidden) {
      requestAnimationFrame(update);
      return;
    }
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -50) p.x = window.innerWidth + 50;
      if (p.x > window.innerWidth + 50) p.x = -50;
      if (p.y < -50) p.y = window.innerHeight + 50;
      if (p.y > window.innerHeight + 50) p.y = -50;

      const dx = p.x - mouseX, dy = p.y - mouseY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const fear = 150;
      if (dist < fear && dist > 0) {
        const force = (fear - dist) / fear;
        const angle = Math.atan2(dy, dx);
        p.x += Math.cos(angle) * force * 8;
        p.y += Math.sin(angle) * force * 8;
        p.el.style.opacity = Math.max(0.15, 0.9 - force * 0.7);
      } else {
        p.el.style.opacity = 0.9;
      }
      p.el.style.left = p.x + 'px';
      p.el.style.top = p.y + 'px';
    }
    requestAnimationFrame(update);
  }
  update();
})();

const THEMES = {

    '--bg':'#070b14', '--mint':'#4fffb0', '--violet':'#7b61ff', '--coral':'#ff6b6b',
    '--txt':'#e8edf5', '--muted':'#9ba8bc', particle:'#4fffb0'

    '--txt':'#3A3D42', '--muted':'#6A6D72', particle:'#8A9BAA'
  }
};

let currentTheme = 'space';
function setTheme(name) {
  currentTheme = name;
  const t = THEMES[name];
  const root = document.documentElement;
  document.body.classList.remove('light-mode');
  for (const [key, val] of Object.entries(t)) {
    if (key === 'particle') continue;
    root.style.setProperty(key, val);
  }
  if (name === 'light') document.body.classList.add('light-mode');
  document.querySelectorAll('.particle').forEach(p => {
    p.style.background = t.particle;
  });
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.theme-btn.${name}`);
  if (btn) btn.classList.add('active');
  localStorage.setItem('distromatch-theme', name);
}

const savedTheme = localStorage.getItem('distromatch-theme');
if (savedTheme && THEMES[savedTheme]) setTheme(savedTheme);

  currentLang = lang;

  document.getElementById('langSelect').value = lang;
  document.getElementById('settingsThemeLabel').textContent = t('settingsTheme');
  document.getElementById('settingsLangLabel').textContent = t('settingsLang');
  document.getElementById('progLabel').textContent = t('progress');
  document.getElementById('footerText').textContent = t('footer');
  document.querySelector('.brand h1').textContent = t('tagline');
  document.querySelector('.brand p').textContent = t('subtitle');
  const progWrap = document.getElementById('progWrap');
  if (!progWrap.style.display || progWrap.style.display === 'none') {
    showStart();
  } else {
    showNormalQ();
  }
}

  currentLang = savedLang;
